; =============================================================================
; COLORS — Matrix green on deep black
; =============================================================================
[color]
bg         = #050805
bg-mod     = #101510
bg-right   = #101510
fg         = #88FF88
fg-dim     = #44CC44
fg-muted   = #2A6B2A
green      = #00FF41
green-soft = #44CC44
green-dark = #2FAF2F
white      = #E8FFE8
alert      = #AAFF44
sep-col    = #1A3A1A

; =============================================================================
; BAR
; =============================================================================
[bar/main]
monitor          =
width            = 100%
height           = 26
offset-x         = 0
offset-y         = 0
radius           = 0
fixed-center     = true

background       = ${color.bg}
foreground       = ${color.fg}

line-size        = 0
border-size      = 0
padding-left     = 0
padding-right    = 0
module-margin-left  = 0
module-margin-right = 0

font-0 = "JetBrainsMono Nerd Font:style=Bold:size=9;3"
font-1 = "Noto Sans:style=Bold:size=9;3"
font-2 = "JetBrainsMono Nerd Font:style=Regular:size=11;3"

modules-left   = menu space ip sep1 vpn-status
modules-center = bspwm
modules-right  = sep2 target sep3 volume sep4 date sep5 power

separator     =
enable-ipc    = true
cursor-click  = pointer
tray-position = none

; =============================================================================
; LEFT — MENU (click to open rofi launcher)
; =============================================================================
[module/menu]
type               = custom/text
content            = "   "
content-foreground = ${color.green}
content-background = ${color.bg-mod}
click-left         = ~/.config/rofi/scripts/launcher.sh &

; =============================================================================
; LEFT — SPACER
; =============================================================================
[module/space]
type               = custom/text
content            = " "
content-background = ${color.bg}

; =============================================================================
; LEFT — IP ADDRESS (auto-detected interface: eth0)
; =============================================================================
[module/ip]
type           = custom/script
exec           = ip -4 addr show eth0 2>/dev/null | awk '/inet / {print $2}' | cut -d/ -f1 | head -n1
interval       = 10
format-padding    = 1
format-foreground = ${color.white}
format-background = ${color.bg}

; =============================================================================
; LEFT — SEPARATOR
; =============================================================================
[module/sep1]
type               = custom/text
content            = "  "
content-background = ${color.bg}

; =============================================================================
; LEFT — VPN / NETWORK STATUS
; External script avoids the "unbound variable" crash from the prior version.
; =============================================================================
[module/vpn-status]
type           = custom/script
exec           = ~/.config/polybar/vpn.sh
interval       = 5
format-padding    = 1
format-foreground = ${color.fg-dim}
format-background = ${color.bg}

; =============================================================================
; CENTER — BSPWM WORKSPACES  ● focused  ● occupied  ○ empty
; =============================================================================
[module/bspwm]
type           = internal/bspwm
pin-workspaces = false
enable-click   = true
enable-scroll  = false

label-focused             = ●
label-focused-foreground  = ${color.green}
label-focused-background  = ${color.bg}
label-focused-padding     = 1

label-occupied            = ●
label-occupied-foreground = ${color.green-soft}
label-occupied-background = ${color.bg}
label-occupied-padding    = 1

label-urgent              = ●
label-urgent-foreground   = ${color.alert}
label-urgent-background   = ${color.bg}
label-urgent-padding      = 1

label-empty               = ○
label-empty-foreground    = ${color.fg-muted}
label-empty-background    = ${color.bg}
label-empty-padding       = 1

; =============================================================================
; RIGHT — SEPARATORS
; =============================================================================
[module/sep2]
type               = custom/text
content            = " "
content-background = ${color.bg}

[module/sep3]
type               = custom/text
content            = "  "
content-foreground = ${color.sep-col}
content-background = ${color.bg-right}

[module/sep4]
type               = custom/text
content            = "  "
content-foreground = ${color.sep-col}
content-background = ${color.bg-right}

[module/sep5]
type               = custom/text
content            = "  "
content-foreground = ${color.sep-col}
content-background = ${color.bg-right}

; =============================================================================
; RIGHT — TARGET (HTB/CTF)
; Left-click: prompt for IP  |  Right-click: clear
; =============================================================================
[module/target]
type           = custom/script
exec           = ~/.config/polybar/target.sh
interval       = 3
format-background = ${color.bg-right}
format-foreground = ${color.green}
format-padding    = 1
click-left        = ~/.config/polybar/set_target.sh &
click-right       = echo "" > ~/.target

; =============================================================================
; RIGHT — VOLUME (PulseAudio)
; =============================================================================
[module/volume]
type                     = internal/pulseaudio
use-ui-max               = false
interval                 = 2

format-volume-background = ${color.bg-right}
format-volume-foreground = ${color.fg}
format-volume-padding    = 1
label-volume             = " %percentage%%"

format-muted-background  = ${color.bg-right}
format-muted-foreground  = ${color.fg-muted}
format-muted-padding     = 1
label-muted              = " muted"

click-right              = pavucontrol &

; =============================================================================
; RIGHT — TIME
; =============================================================================
[module/date]
type              = internal/date
interval          = 1
time              = " %I:%M %p"
format-background = ${color.bg-right}
format-foreground = ${color.fg}
format-padding    = 1
label             = %time%

; =============================================================================
; RIGHT — POWER BUTTON
; =============================================================================
[module/power]
type               = custom/text
content            = " ⏻ "
content-foreground = ${color.green-dark}
content-background = ${color.bg-right}
click-left         = ~/.config/rofi/scripts/powermenu.sh &
